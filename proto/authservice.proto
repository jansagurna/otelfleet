syntax = "proto3";

package otelfleet.auth.v1;

option go_package = "github.com/jansagurna/otelfleet/internal/ingestauth/authv1";

// AuthService is the internal control-plane service the gateway collectors'
// tenantauth extension calls to validate ingest API keys. It is exposed on the
// internal gRPC listener only and must never be reachable from outside the cluster.
service AuthService {
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
}

message ValidateAPIKeyRequest {
  // Full API key as presented by the client, e.g. "otm_ab12cd34_...".
  string api_key = 1;
}

message ValidateAPIKeyResponse {
  bool valid = 1;
  // Set only when valid.
  string customer_id = 2; // customers.id (UUID)
  string client_id = 3;   // stamped as resource attribute tenant.id
  // How long the caller may cache this positive result.
  uint32 cache_ttl_seconds = 4;
  // Per-tenant ingest quota in items (log records / spans / metric points)
  // per second; 0 = unlimited. Enforced by the tenantquota processor via a
  // local token bucket; limit changes propagate within the cache TTL.
  uint32 rate_limit_items_per_sec = 5;
}
