name: Bug report
description: Something is broken
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! **Security issues:** please do NOT file them here —
        email security@sag-solutions.com (see SECURITY.md).
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Control plane (REST API / UI backend)
        - Web UI
        - Gateway collector (tenantauth / tenantstamp / ingest)
        - Forwarding tier / pipeline rendering
        - Edge agent / OpAMP
        - SSO / users / audit
        - Helm chart
        - Compose / demo environment
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: otelfleet version, image tag, or commit SHA
      placeholder: v0.3.0 / f69cb57
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / config
      description: >-
        Control-plane logs, collector logs, rendered config, values.yaml, ...
        **Redact API keys, bootstrap tokens, client secrets and the master key.**
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Deployment: compose / demo / Helm (deployment|operator mode)
        Kubernetes/Docker versions, OS/arch:
