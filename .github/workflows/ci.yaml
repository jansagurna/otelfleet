name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make gen-go
      - run: git diff --exit-code

  collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test custom components
        run: make -C collector test
      - name: Build distro (OCB)
        run: make -C collector build
      - name: Validate gateway config
        run: make -C collector validate
        env:
          OTELFLEET_AUTH_ENDPOINT: localhost:9443
          CLICKHOUSE_ENDPOINT: tcp://localhost:9000?database=otel

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen && git diff --exit-code ../api
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/charts/otelfleet --set external.databaseUrl=postgres://x:y@pg:5432/otelfleet
      - name: Template forwarding modes and KEDA autoscaling
        run: |
          helm template t deploy/charts/otelfleet --set external.databaseUrl=postgres://x:y@pg:5432/otelfleet > /dev/null
          helm template t deploy/charts/otelfleet --set external.databaseUrl=postgres://x:y@pg:5432/otelfleet \
            --set forwarding.mode=operator --set controlPlane.distributor=k8s > /dev/null
          helm template t deploy/charts/otelfleet --set external.databaseUrl=postgres://x:y@pg:5432/otelfleet \
            --set keda.enabled=true --set gateway.autoscaling.ingestRatePerReplica=5000 > /dev/null
      - run: helm lint deploy/charts/otelfleet-agent --set opamp.endpoint=wss://idp/v1/opamp --set bootstrapToken.value=otm_bt_x
      - name: Template edge-agent chart (inline token, and existing-secret + no-persistence)
        run: |
          helm template a deploy/charts/otelfleet-agent \
            --set opamp.endpoint=wss://idp/v1/opamp --set bootstrapToken.value=otm_bt_x --set region=eu > /dev/null
          helm template a deploy/charts/otelfleet-agent \
            --set opamp.endpoint=wss://idp/v1/opamp --set bootstrapToken.existingSecret=s --set persistence.enabled=false > /dev/null
          helm template a deploy/charts/otelfleet-agent \
            --set opamp.endpoint=wss://idp/v1/opamp --set bootstrapToken.value=otm_bt_x \
            --set opamp.tls.clientCertSecret=mtls --set opamp.tls.serverName=idp \
            --set autoscaling.enabled=true --set networkPolicy.enabled=true \
            --set 'networkPolicy.allowedCIDRs={10.0.0.0/8}' > /dev/null

  # Exercise the release config on every push: goreleaser only runs on a tag,
  # so archive/build mistakes (e.g. per-platform binary-count mismatches) would
  # otherwise stay invisible until the release fails. A snapshot release does a
  # full build + archive without publishing — `goreleaser check` alone does not
  # catch archive-level errors.
  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser inspects git state
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish,sign

  collector-image:
    runs-on: ubuntu-latest
    needs: [collector]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -f Dockerfile.collector .

  control-plane-image:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build .
