name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make gen-go
      - run: git diff --exit-code

  collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test custom components
        run: make -C collector test
      - name: Build distro (OCB)
        run: make -C collector build
      - name: Validate gateway config
        run: make -C collector validate
        env:
          OTELFLEET_AUTH_ENDPOINT: localhost:9443
          CLICKHOUSE_ENDPOINT: tcp://localhost:9000?database=otel

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen && git diff --exit-code ../api
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  collector-image:
    runs-on: ubuntu-latest
    needs: [collector]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -f Dockerfile.collector .
