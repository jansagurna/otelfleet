name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # goreleaser: create the GitHub release
  packages: write   # push images + chart to GHCR
  id-token: write   # cosign keyless signing

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: otelfleet
            dockerfile: Dockerfile
          - image: otelfleet-collector
            dockerfile: Dockerfile.collector
          - image: otelfleet-supervisor
            dockerfile: Dockerfile.supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "${REGISTRY}/${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}

  helm-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3
      # Writes ~/.docker/config.json so BOTH `helm push` and `cosign sign`
      # (which resolves GHCR creds from the docker config, not helm's own
      # store) are authenticated. `helm registry login` alone left cosign
      # unauthenticated and its signature upload failed with UNAUTHORIZED.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify chart version matches the tag
        run: |
          chart_version=$(helm show chart deploy/charts/otelfleet | awk '/^version:/ {print $2}')
          if [ "$chart_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Chart version ($chart_version) != tag version (${{ steps.version.outputs.version }})." \
                 "Bump version/appVersion in deploy/charts/otelfleet/Chart.yaml before tagging (see RELEASING.md)."
            exit 1
          fi
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Package and push chart
        id: push
        run: |
          helm package deploy/charts/otelfleet --destination dist/
          out=$(helm push "dist/otelfleet-${{ steps.version.outputs.version }}.tgz" "oci://${REGISTRY}/charts" 2>&1)
          echo "$out"
          digest=$(echo "$out" | awk '/Digest:/ {print $2}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Sign chart (cosign keyless)
        run: |
          cosign sign --yes \
            "${REGISTRY}/charts/otelfleet@${{ steps.push.outputs.digest }}"
