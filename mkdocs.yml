site_name: otelfleet
site_description: >-
  Self-hosted, multi-tenant OpenTelemetry collector fleet management.
site_url: https://jansagurna.github.io/otelfleet/
repo_url: https://github.com/jansagurna/otelfleet
repo_name: jansagurna/otelfleet
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Dark by default, with a toggle to light.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installation:
      - Helm: installation/helm.md
      - Configuration reference: installation/configuration.md
  - Guides:
      - Sending data: guides/sending-data.md
      - Multi-tenancy: guides/multi-tenancy.md
      - Pipelines: guides/pipelines.md
      - Pipeline templates: guides/pipeline-templates.md
      - Metered billing: guides/billing.md
      - Edge agents: guides/edge-agents.md
      - Single sign-on: guides/sso.md
      - SAML SSO: guides/saml.md
      - SCIM provisioning: guides/scim.md
      - CLI & config-as-code: guides/cli.md
  - Architecture: architecture.md
  - Reference:
      - REST API: reference/api.md
  - Development: development.md
