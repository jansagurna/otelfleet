global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otelcol-gateway
    static_configs:
      - targets: ["gateway:8888"]
        labels:
          collector_class: gateway
  - job_name: otelcol-forwarding
    static_configs:
      - targets: ["forwarding:8888"]
        labels:
          collector_class: forwarding
  - job_name: otelcol-acme-backend
    static_configs:
      - targets: ["acme-backend:8888"]
        labels:
          collector_class: demo-backend
  - job_name: otelfleet-control-plane
    static_configs:
      - targets: ["host.docker.internal:9090"]
