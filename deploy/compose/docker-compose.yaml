# Local development environment. The control plane runs on the host
# (`make run`, :8080 REST / :9443 internal gRPC); everything else runs here.
name: otelfleet-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: otelfleet
      POSTGRES_USER: otelfleet
      POSTGRES_PASSWORD: otelfleet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otelfleet"]
      interval: 3s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    environment:
      CLICKHOUSE_USER: otelfleet
      CLICKHOUSE_PASSWORD: otelfleet
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    volumes:
      - chdata:/var/lib/clickhouse
      - ../clickhouse/schema:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user otelfleet --password otelfleet --query 'SELECT 1'"]
      interval: 3s
      timeout: 3s
      retries: 30

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=30d
      - -httpListenAddr=:8428
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage

  vmagent:
    image: victoriametrics/vmagent:v1.115.0
    command:
      - -promscrape.config=/etc/vmagent/scrape.yaml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    volumes:
      - ./vmagent-scrape.yaml:/etc/vmagent/scrape.yaml:ro
    depends_on:
      - victoriametrics

  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile.collector
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      # Control plane running on the host via `make run`.
      OTELFLEET_AUTH_ENDPOINT: host.docker.internal:9443
      CLICKHOUSE_ENDPOINT: tcp://clickhouse:9000?database=otel&username=otelfleet&password=otelfleet
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # collector self-telemetry
    volumes:
      - ./otelcol-gateway.yaml:/etc/otelcol/config.yaml:ro
      - gwqueue:/var/lib/otelcol
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      clickhouse:
        condition: service_healthy

  # P2 forwarding tier. Its entire config is rendered by the control plane
  # (running on the host via `make run`) and loaded through the collector's
  # HTTP config provider; config changes are picked up on container restart.
  # NOTE: until the control plane is up and serving this endpoint, the
  # container crash-loops harmlessly (restart: unless-stopped).
  forwarding:
    build:
      context: ../..
      dockerfile: Dockerfile.collector
    command: ["--config=http://host.docker.internal:9090/internal/v1/collector-config/forwarding"]
    restart: unless-stopped
    expose:
      - "8888" # collector self-telemetry, scraped by vmagent
    ports:
      - "8889:8888" # host mapping for debugging only
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Demo "customer backend": target of the P2 forwarding e2e. The forwarding
  # tier's per-customer otlp exporter sends here; the debug exporter prints
  # what arrives. Stands in for a customer's own OTLP endpoint.
  acme-backend:
    build:
      context: ../..
      dockerfile: Dockerfile.collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol-acme-backend.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "4317" # OTLP gRPC (from the forwarding tier)
      - "8888" # collector self-telemetry, scraped by vmagent

  # P3 edge-agent demo: OpAMP supervisor + otelfleet collector, standing in
  # for an agent deployed inside a customer network. It dials OUT to the
  # control plane's OpAMP server on the host (ws://host.docker.internal:4320/
  # v1/opamp), authenticates with a per-customer bootstrap token, and receives
  # its full collector config as OpAMP remote config. No published ports —
  # edge agents only make outbound connections.
  #
  # Behind the "edge" profile so a plain `docker compose up -d` does NOT
  # start it (it needs a real bootstrap token). Start it with:
  #   OTELFLEET_BOOTSTRAP_TOKEN=otm_bt_<prefix>_<secret> \
  #     docker compose --profile edge up -d edge-agent
  # or one-shot (e.g. from the P3 e2e):
  #   docker compose --profile edge run --rm \
  #     -e OTELFLEET_BOOTSTRAP_TOKEN=otm_bt_<prefix>_<secret> edge-agent
  edge-agent:
    profiles: ["edge"]
    build:
      context: ../..
      dockerfile: Dockerfile.supervisor
    environment:
      OTELFLEET_BOOTSTRAP_TOKEN: ${OTELFLEET_BOOTSTRAP_TOKEN:-}
    restart: unless-stopped
    volumes:
      - ./supervisor.yaml:/etc/otelfleet/supervisor.yaml:ro
      # Last-good config + instance ID; lets the supervisor start the
      # collector on the persisted config when the control plane is down.
      - edgestate:/var/lib/otelfleet-supervisor
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  chdata:
  vmdata:
  gwqueue:
  edgestate:
