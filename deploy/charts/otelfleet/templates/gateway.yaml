{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otelfleet.fullname" . }}-gateway
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  config.yaml: |
{{ .Files.Get "files/otelcol-gateway.yaml" | indent 4 }}
  {{- if .Values.gateway.ingestTLS.enabled }}
  # Overlay merged onto config.yaml (second --config) to serve OTLP over TLS.
  tls-overlay.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            tls:
              cert_file: /etc/otelcol-tls/tls.crt
              key_file: /etc/otelcol-tls/tls.key
              {{- if .Values.gateway.ingestTLS.mtls }}
              client_ca_file: /etc/otelcol-tls/ca.crt
              {{- end }}
          http:
            tls:
              cert_file: /etc/otelcol-tls/tls.crt
              key_file: /etc/otelcol-tls/tls.key
              {{- if .Values.gateway.ingestTLS.mtls }}
              client_ca_file: /etc/otelcol-tls/ca.crt
              {{- end }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otelfleet.fullname" . }}-gateway
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "otelfleet.selector" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "otelfleet.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      annotations:
        # Roll the pods when the static ingest config or the TLS toggle changes.
        checksum/config: {{ .Files.Get "files/otelcol-gateway.yaml" | sha256sum }}
        checksum/ingest-tls: {{ .Values.gateway.ingestTLS | toYaml | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: otelcol
          image: {{ include "otelfleet.collectorImage" . }}
          imagePullPolicy: {{ .Values.images.collector.pullPolicy }}
          args:
            - --config=/etc/otelcol/config.yaml
            {{- if .Values.gateway.ingestTLS.enabled }}
            - --config=/etc/otelcol/tls-overlay.yaml
            {{- end }}
          env:
            - name: OTELFLEET_AUTH_ENDPOINT
              value: {{ printf "%s-control-plane:9443" (include "otelfleet.fullname" .) | quote }}
            - name: CLICKHOUSE_ENDPOINT
              value: {{ .Values.external.clickhouse.exporterEndpoint | quote }}
            - name: OTELFLEET_VM_REMOTE_WRITE
              value: {{ .Values.external.victoriaMetrics.remoteWriteUrl | quote }}
            - name: OTELFLEET_FORWARD_ENDPOINT
              value: {{ printf "%s-forwarding:4317" (include "otelfleet.fullname" .) | quote }}
            - name: GOMEMLIMIT
              value: "750MiB"
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: telemetry, containerPort: 8888 }
            - { name: health, containerPort: 13133 }
          readinessProbe:
            httpGet: { path: /, port: health }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /, port: health }
            initialDelaySeconds: 10
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol, readOnly: true }
            - { name: queue, mountPath: /var/lib/otelcol }
            {{- if .Values.gateway.ingestTLS.enabled }}
            - { name: ingest-tls, mountPath: /etc/otelcol-tls, readOnly: true }
            {{- end }}
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "otelfleet.fullname" . }}-gateway
        {{- if .Values.gateway.ingestTLS.enabled }}
        - name: ingest-tls
          secret:
            secretName: {{ required "gateway.ingestTLS.secretName is required when ingestTLS.enabled" .Values.gateway.ingestTLS.secretName | quote }}
        {{- end }}
        - name: queue
          {{- if .Values.gateway.persistentQueue.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "otelfleet.fullname" . }}-gateway-queue
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otelfleet.fullname" . }}-gateway
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  {{- with .Values.gateway.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "otelfleet.selector" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: telemetry, port: 8888, targetPort: telemetry }
{{- if .Values.gateway.persistentQueue.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "otelfleet.fullname" . }}-gateway-queue
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.gateway.persistentQueue.size }}
  {{- with .Values.gateway.persistentQueue.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
{{- end }}
