{{- if .Values.keda.enabled }}
{{- if .Values.gateway.enabled }}
# Ingest tier: scale on CPU, optionally also on per-pod ingest rate. The
# ingest tier terminates customer traffic, so it never scales to zero.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "otelfleet.fullname" . }}-gateway
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    name: {{ include "otelfleet.fullname" . }}-gateway
  minReplicaCount: {{ .Values.gateway.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.gateway.autoscaling.maxReplicas }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: {{ .Values.gateway.autoscaling.cpuUtilization | quote }}
    {{- if gt (int .Values.gateway.autoscaling.ingestRatePerReplica) 0 }}
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.keda.prometheusAddress | quote }}
        query: sum(rate(otelcol_receiver_accepted_log_records{collector_class="gateway"}[2m])) + sum(rate(otelcol_receiver_accepted_spans{collector_class="gateway"}[2m])) + sum(rate(otelcol_receiver_accepted_metric_points{collector_class="gateway"}[2m]))
        threshold: {{ .Values.gateway.autoscaling.ingestRatePerReplica | quote }}
    {{- end }}
{{- end }}
{{- if and .Values.forwarding.enabled (eq .Values.forwarding.mode "deployment") }}
---
# Forwarding tier: scale on CPU and on the busiest exporter's queue fill ratio;
# may scale to zero when no tenant has forwarding pipelines.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "otelfleet.fullname" . }}-forwarding
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: forwarding
spec:
  scaleTargetRef:
    name: {{ include "otelfleet.fullname" . }}-forwarding
  minReplicaCount: {{ .Values.forwarding.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.forwarding.autoscaling.maxReplicas }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: {{ .Values.forwarding.autoscaling.cpuUtilization | quote }}
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.keda.prometheusAddress | quote }}
        query: max(otelcol_exporter_queue_size{collector_class="forwarding"} / otelcol_exporter_queue_capacity{collector_class="forwarding"})
        threshold: {{ .Values.forwarding.autoscaling.queueUtilization | quote }}
{{- end }}
{{- end }}
