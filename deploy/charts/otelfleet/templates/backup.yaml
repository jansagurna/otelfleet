{{- if .Values.backup.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "otelfleet.fullname" . }}-pg-backup
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.backup.postgres.storage.size }}
  {{- with .Values.backup.postgres.storage.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "otelfleet.fullname" . }}-pg-backup
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.postgres.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "otelfleet.selector" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets: {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: pg-backup
              image: {{ .Values.backup.postgres.image }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  ts=$(date -u +%Y%m%dT%H%M%SZ)
                  out="/backup/otelfleet-${ts}.dump"
                  echo "dumping control-plane database to ${out}"
                  # Custom-format dump (pg_restore-compatible, compressed).
                  pg_dump --format=custom --file="${out}" "${OTELFLEET_DATABASE_URL}"
                  echo "pruning dumps older than {{ .Values.backup.postgres.retentionDays }} days"
                  find /backup -name 'otelfleet-*.dump' -mtime +{{ .Values.backup.postgres.retentionDays }} -delete
                  ls -lh /backup
              env:
                {{- if .Values.external.databaseUrlSecret }}
                - name: OTELFLEET_DATABASE_URL
                  valueFrom:
                    secretKeyRef: { name: {{ .Values.external.databaseUrlSecret | quote }}, key: OTELFLEET_DATABASE_URL }
                {{- else }}
                - { name: OTELFLEET_DATABASE_URL, value: {{ required "external.databaseUrl or external.databaseUrlSecret is required for backup" .Values.external.databaseUrl | quote }} }
                {{- end }}
              volumeMounts:
                - { name: backup, mountPath: /backup }
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: {{ include "otelfleet.fullname" . }}-pg-backup
{{- end }}
{{- if .Values.backup.clickhouse.enabled }}
---
# ClickHouse backups via clickhouse-backup (full backup + upload to the
# configured remote storage). Configure S3/GCS + ClickHouse credentials in the
# referenced Secret per the clickhouse-backup docs.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "otelfleet.fullname" . }}-ch-backup
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.clickhouse.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "otelfleet.selector" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          containers:
            - name: ch-backup
              image: {{ .Values.backup.clickhouse.image }}
              args: ["create_remote", "otelfleet-$(date -u +%Y%m%dT%H%M%SZ)"]
              {{- with .Values.backup.clickhouse.envSecretName }}
              envFrom:
                - secretRef: { name: {{ . | quote }} }
              {{- end }}
{{- end }}
