{{- $roles := list (dict "role" "all" "component" "control-plane" "replicas" .Values.controlPlane.replicas) }}
{{- if eq .Values.controlPlane.mode "split" }}
{{- $roles = list (dict "role" "api" "component" "api" "replicas" .Values.controlPlane.api.replicas) (dict "role" "opamp" "component" "opamp" "replicas" 1) }}
{{- end }}
{{- range $r := $roles }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otelfleet.fullname" $ }}-{{ $r.component }}
  labels:
    {{- include "otelfleet.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $r.component }}
spec:
  replicas: {{ $r.replicas }}
  selector:
    matchLabels:
      {{- include "otelfleet.selector" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $r.component }}
  template:
    metadata:
      labels:
        {{- include "otelfleet.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $r.component }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "otelfleet.fullname" $ }}
      containers:
        - name: control-plane
          image: {{ include "otelfleet.controlPlaneImage" $ }}
          imagePullPolicy: {{ $.Values.images.controlPlane.pullPolicy }}
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 9443 }
            - { name: ops, containerPort: 9090 }
            - { name: opamp, containerPort: 4320 }
          env:
            - { name: OTELFLEET_ROLE, value: {{ $r.role | quote }} }
            {{- include "otelfleet.controlPlaneEnv" $ | nindent 12 }}
          # /healthz + /readyz are served on the ops port by every role.
          readinessProbe:
            httpGet: { path: /readyz, port: ops }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: ops }
            initialDelaySeconds: 10
          resources: {{- toYaml $.Values.controlPlane.resources | nindent 12 }}
          {{- $mounts := include "otelfleet.tlsVolumeMounts" $ }}
          {{- with $mounts }}
          volumeMounts: {{ . | nindent 12 }}
          {{- end }}
      {{- $volumes := include "otelfleet.tlsVolumes" $ }}
      {{- with $volumes }}
      volumes: {{ . | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otelfleet.fullname" . }}-control-plane
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  selector:
    {{- include "otelfleet.selector" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "otelfleet.apiComponent" . }}
  ports:
    - { name: http, port: 8080, targetPort: http }
    - { name: grpc, port: 9443, targetPort: grpc }
    - { name: ops, port: 9090, targetPort: ops }
---
# Edge agents in customer networks dial this endpoint; expose it via
# LoadBalancer or an ingress capable of WebSockets.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otelfleet.fullname" . }}-opamp
  labels:
    {{- include "otelfleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: {{ .Values.controlPlane.opamp.service.type }}
  selector:
    {{- include "otelfleet.selector" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "otelfleet.opampComponent" . }}
  ports:
    - { name: opamp, port: {{ .Values.controlPlane.opamp.service.port }}, targetPort: opamp }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "otelfleet.fullname" . }}
  labels: {{- include "otelfleet.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if eq .Values.controlPlane.distributor "k8s" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "otelfleet.fullname" . }}-cr-patcher
  labels: {{- include "otelfleet.labels" . | nindent 4 }}
rules:
  - apiGroups: ["opentelemetry.io"]
    resources: ["opentelemetrycollectors"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "otelfleet.fullname" . }}-cr-patcher
  labels: {{- include "otelfleet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "otelfleet.fullname" . }}-cr-patcher
subjects:
  - kind: ServiceAccount
    name: {{ include "otelfleet.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "otelfleet.fullname" . }}
  labels: {{- include "otelfleet.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "otelfleet.fullname" . }}-control-plane
                port: { name: http }
{{- end }}
