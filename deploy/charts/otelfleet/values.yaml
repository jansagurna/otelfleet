# otelfleet chart values.
#
# External stateful services are REQUIRED (bring your own):
# PostgreSQL (control-plane state), ClickHouse (telemetry) and a
# Prometheus-compatible store (collector self-telemetry, e.g. VictoriaMetrics).

images:
  controlPlane:
    repository: ghcr.io/jansagurna/otelfleet
    tag: ""            # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  collector:
    repository: ghcr.io/jansagurna/otelfleet-collector
    tag: ""            # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

imagePullSecrets: []

external:
  # postgres://user:pass@host:5432/otelfleet — or set existingSecret below.
  databaseUrl: ""
  # Name of a Secret with key OTELFLEET_DATABASE_URL; takes precedence.
  databaseUrlSecret: ""
  clickhouse:
    addr: "clickhouse:9000"           # native protocol host:port
    database: otel
    user: otelfleet
    passwordSecret: ""                # Secret with key OTELFLEET_CLICKHOUSE_PASSWORD
    password: ""                      # inline fallback (dev only)
    # DSN used by the gateway collector's clickhouse exporter.
    exporterEndpoint: "tcp://clickhouse:9000?database=otel&username=otelfleet&password=otelfleet"
  victoriaMetrics:
    url: "http://victoriametrics:8428"
    remoteWriteUrl: "http://victoriametrics:8428/api/v1/write"

controlPlane:
  # all:   one deployment runs every role (simplest; OpAMP is a SPOF).
  # split: a stateless API tier (HTTP + gRPC, scale to api.replicas) plus a
  #        singleton OpAMP tier (WebSockets + background workers). Recommended
  #        for production — the request path is no longer a single replica.
  mode: all
  replicas: 1          # mode=all only: single combined replica
  api:
    replicas: 2        # mode=split only: stateless API tier replica count
  adminEmails: []      # e.g. ["ops@example.com"] — get role admin on first login
  devLogin: false
  baseUrl: ""          # external URL, required for OIDC redirects
  sessionSecure: true
  # Secret with key OTELFLEET_MASTER_KEY (base64, 32 bytes — e.g.
  # `openssl rand -base64 32`). Required for storing SSO providers and
  # pipeline credentials (encrypted at rest); without it those features
  # return a clear error.
  masterKeySecret: ""
  oidc:
    # Env-defined fallback OIDC provider; additional providers (Google,
    # Microsoft, GitHub, generic OIDC) are managed in the UI under
    # Settings -> SSO and stored encrypted in the database.
    issuer: ""
    clientId: ""
    displayName: SSO
    clientSecretRef: ""   # Secret with key OTELFLEET_OIDC_CLIENT_SECRET
  # Extra environment variables for the control-plane container (verbatim
  # EnvVar entries), e.g. proxy settings.
  extraEnv: []
  # In-cluster TLS. When disabled the listeners are plaintext (terminate TLS
  # at an ingress in front). When enabled the pods serve TLS directly.
  tls:
    enabled: false
    # Secret (type kubernetes.io/tls: tls.crt + tls.key) for the public
    # listeners — HTTPS on :8080 and wss:// OpAMP on :4320.
    publicSecretName: ""
    # Secret (tls.crt + tls.key, and ca.crt for mTLS) for the internal gRPC
    # AuthService the gateway collectors call.
    grpcSecretName: ""
    # Require gateway collectors to present a client cert (mTLS). The gRPC
    # secret must then include ca.crt (the CA that signs client certs).
    grpcMTLS: false
    # Secret with ca.crt: when set (and tls.enabled), the public OpAMP listener
    # (:4320) requires and verifies an agent client cert signed by this CA
    # (mTLS), on top of the enrollment token. Pair with the agent chart's
    # opamp.tls.clientCertSecret.
    opampClientCASecret: ""
    # Optionally let cert-manager issue the two secrets from an Issuer.
    certManager:
      enabled: false
      # dnsNames the public cert should cover (OpAMP/HTTPS hostnames).
      publicDNSNames: []
      issuerRef: {}   # { name: my-issuer, kind: ClusterIssuer }
  # publish: forwarding pods pull config from the ops endpoint (restart to
  # apply). k8s: control plane patches the OpenTelemetryCollector CR (requires
  # the opentelemetry-operator and forwarding.mode=operator).
  distributor: publish
  opamp:
    service:
      # How edge agents (customer networks!) reach the OpAMP endpoint.
      type: ClusterIP   # set LoadBalancer or wire an ingress/gateway for production
      port: 4320
      # IP allowlist for a type: LoadBalancer OpAMP endpoint (cloud LB enforced).
      loadBalancerSourceRanges: []
    # Externally reachable OpAMP URL offered to edge agents with their
    # per-agent token (e.g. wss://opamp.example.com/v1/opamp). Empty = offer
    # only the new auth header; agents keep their current endpoint.
    publicEndpoint: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { memory: 512Mi }

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
  annotations: {}

gateway:
  enabled: true
  replicas: 2
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { memory: 1Gi }
  service:
    type: ClusterIP     # front with LB/ingress-grpc for customer OTLP in production
    # IP allowlist for a type: LoadBalancer service — the cloud LB enforces it
    # in front of the public OTLP endpoint. e.g. ["203.0.113.0/24"]
    loadBalancerSourceRanges: []
  # TLS / mTLS on the public OTLP ingest receiver. Certs come from a
  # kubernetes.io/tls Secret (tls.crt + tls.key, plus ca.crt when mtls). Served
  # via a config overlay merged onto the static gateway config.
  ingestTLS:
    enabled: false
    mtls: false        # also require and verify a client certificate
    secretName: ""     # required when enabled
  persistentQueue:
    enabled: false      # PVC-backed sending queue for the clickhouse exporter
    size: 5Gi
    storageClassName: ""
  # KEDA autoscaling (requires the KEDA operator; keda.enabled below). When
  # off, replicas above is the fixed count.
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70   # scale on CPU %
    # Optional: also scale on ingest rate per pod (needs the Prometheus
    # scaler pointed at the metrics store). 0 disables this trigger.
    ingestRatePerReplica: 0

forwarding:
  enabled: true
  # deployment: plain Deployment pulling its config from the control plane's
  # ops endpoint at pod start (kubectl rollout restart to apply changes).
  # operator: an OpenTelemetryCollector CR managed by the control plane
  # (set controlPlane.distributor=k8s; requires the opentelemetry-operator).
  mode: deployment
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { memory: 512Mi }
  # KEDA autoscaling for the forwarding tier (deployment mode only). The
  # right signal is exporter queue utilization — needs the Prometheus scaler.
  autoscaling:
    minReplicas: 1        # can scale to 0 when no tenant has forwarding pipelines
    maxReplicas: 6
    cpuUtilization: 70
    # Prometheus scaler on max exporter queue fill ratio across the tier.
    queueUtilization: 0.7

# KEDA-based autoscaling. Requires the KEDA operator installed in the cluster
# (https://keda.sh). When disabled, the tiers run at their fixed replica counts.
keda:
  enabled: false
  # PromQL endpoint for the Prometheus scaler (VictoriaMetrics is compatible).
  prometheusAddress: "http://victoriametrics:8428"
  pollingInterval: 30
  cooldownPeriod: 300

serviceAccount:
  create: true
  annotations: {}

podLabels: {}
nodeSelector: {}
tolerations: []

# Scheduled backups. PostgreSQL holds the irreplaceable control-plane state
# (customers, keys, pipelines, agents, users) and is backed up by default when
# enabled; ClickHouse telemetry is TTL-bounded and reconstructable, so its
# backup is optional. See RECOVERY.md for restore procedures.
backup:
  postgres:
    enabled: false
    schedule: "0 2 * * *"        # daily 02:00
    image: postgres:17-alpine
    retentionDays: 14
    storage:
      size: 10Gi
      storageClassName: ""
    # DATABASE_URL source: reuse external.databaseUrl / external.databaseUrlSecret.
  clickhouse:
    enabled: false
    schedule: "0 3 * * *"
    # clickhouse-backup handles full/incremental backups to S3-compatible
    # storage; configure it via a Secret referenced here (see its docs).
    image: altinity/clickhouse-backup:latest
    envSecretName: ""            # Secret with clickhouse-backup S3 + CH creds
