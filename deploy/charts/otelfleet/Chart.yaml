apiVersion: v2
name: otelfleet
description: >
  Multi-tenant OpenTelemetry collector fleet management: control plane
  (REST API + web UI + OpAMP server), gateway ingest tier and forwarding tier.
  PostgreSQL, ClickHouse and a Prometheus-compatible metrics store are
  consumed via endpoints (bring your own); optional in-cluster dependencies
  land in a later release.
type: application
version: 0.3.0
appVersion: "0.3.0"
kubeVersion: ">=1.27.0"
home: https://github.com/sag-solutions/otelfleet
sources:
  - https://github.com/sag-solutions/otelfleet
maintainers:
  - name: SAG Solutions
    email: js@sag-solutions.com
