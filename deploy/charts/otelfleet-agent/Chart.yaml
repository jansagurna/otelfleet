apiVersion: v2
name: otelfleet-agent
description: >
  otelfleet edge agent for Kubernetes: an OpAMP-managed OpenTelemetry collector
  (opampsupervisor + the otelfleet collector distro) that enrolls with the
  control plane, receives its pipeline configuration remotely, and forwards a
  customer's telemetry to the region's gateway. Deploy one release per region
  (point opamp.endpoint at that region's OpAMP endpoint). The Docker/compose
  edge agent and this chart run the same supervisor image and config.
type: application
version: 0.5.1
appVersion: "0.5.1"
kubeVersion: ">=1.27.0"
home: https://github.com/jansagurna/otelfleet
sources:
  - https://github.com/jansagurna/otelfleet
maintainers:
  - name: SAG-Solutions GmbH
    email: js@sag-solutions.com
