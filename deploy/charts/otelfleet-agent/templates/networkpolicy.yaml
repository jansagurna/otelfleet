{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "otelfleet-agent.fullname" . }}
  labels:
    {{- include "otelfleet-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "otelfleet-agent.selector" . | nindent 6 }}
  policyTypes: [Ingress]
  {{- if or .Values.networkPolicy.allowedNamespaces .Values.networkPolicy.allowedPodSelector .Values.networkPolicy.allowedCIDRs }}
  ingress:
    - ports:
        - { port: 4317, protocol: TCP }
        - { port: 4318, protocol: TCP }
      from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- with .Values.networkPolicy.allowedPodSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- range .Values.networkPolicy.allowedCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
  {{- else }}
  # No sources configured → deny all ingress (agents only dial out to OpAMP).
  ingress: []
  {{- end }}
{{- end }}
