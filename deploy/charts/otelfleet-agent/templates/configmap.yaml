apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otelfleet-agent.fullname" . }}-supervisor
  labels:
    {{- include "otelfleet-agent.labels" . | nindent 4 }}
data:
  # OpAMP supervisor config (schema: opampsupervisor v0.156.0). The managed
  # collector's pipeline (receivers/exporters) is pushed by the control plane
  # via OpAMP remote config — only the OpAMP connection is configured here.
  supervisor.yaml: |
    server:
      endpoint: {{ required "opamp.endpoint is required (per-region OpAMP URL)" .Values.opamp.endpoint | quote }}
      headers:
        # Enrollment bootstrap token from the mounted Secret. The supervisor's
        # confmap env provider expands ${env:...} at startup.
        Authorization: "Bearer ${env:OTELFLEET_BOOTSTRAP_TOKEN}"
      tls:
        insecure: {{ .Values.opamp.tls.insecure }}
        insecure_skip_verify: {{ .Values.opamp.tls.insecureSkipVerify }}
        {{- if .Values.opamp.tls.caCert }}
        ca_file: /etc/otelfleet/ca.crt
        {{- end }}
        {{- if .Values.opamp.tls.clientCertSecret }}
        cert_file: /etc/otelfleet-client-tls/tls.crt
        key_file: /etc/otelfleet-client-tls/tls.key
        {{- end }}
        {{- with .Values.opamp.tls.serverName }}
        server_name_override: {{ . | quote }}
        {{- end }}
    capabilities:
      accepts_remote_config: true
      reports_effective_config: true
      reports_remote_config: true
      reports_health: true
      reports_own_metrics: false
      # Accept the per-agent token the control plane offers at enrollment, so
      # revoking the customer bootstrap token never disturbs enrolled agents.
      accepts_opamp_connection_settings: true
    agent:
      executable: /usr/local/bin/otelfleet-collector
      config_apply_timeout: 30s
      bootstrap_timeout: 10s
      passthrough_logs: true
    storage:
      directory: /var/lib/otelfleet-supervisor
    telemetry:
      logs:
        level: {{ .Values.logLevel | quote }}
        encoding: console
  {{- with .Values.opamp.tls.caCert }}
  ca.crt: |
    {{- . | nindent 4 }}
  {{- end }}
