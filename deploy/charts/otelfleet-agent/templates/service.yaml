apiVersion: v1
kind: Service
metadata:
  name: {{ include "otelfleet-agent.fullname" . }}-headless
  labels:
    {{- include "otelfleet-agent.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "otelfleet-agent.selector" . | nindent 4 }}
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otelfleet-agent.fullname" . }}
  labels:
    {{- include "otelfleet-agent.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "otelfleet-agent.selector" . | nindent 4 }}
  ports:
    - { name: otlp-grpc, port: {{ .Values.service.otlpGrpcPort }}, targetPort: otlp-grpc, protocol: TCP }
    - { name: otlp-http, port: {{ .Values.service.otlpHttpPort }}, targetPort: otlp-http, protocol: TCP }
