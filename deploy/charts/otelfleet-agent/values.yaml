# otelfleet edge agent (Kubernetes). Install one release per region, pointing
# opamp.endpoint at that region's OpAMP endpoint.

image:
  repository: ghcr.io/jansagurna/otelfleet-supervisor
  tag: "" # defaults to the chart appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# OpAMP control-plane endpoint for THIS region. Required.
#   e.g. wss://eu.otelfleet.example.com/v1/opamp
opamp:
  endpoint: ""
  # true only for a plaintext ws:// endpoint (local/dev). Use wss:// + false in
  # production so the bootstrap token is not sent in clear.
  insecureTLS: false

# Per-customer enrollment bootstrap token (otm_bt_…). Provide it inline (dev)
# or reference an existing Secret. After first connect the control plane hands
# the agent its own per-agent token, so this is only used to enroll.
bootstrapToken:
  value: ""
  existingSecret: "" # a Secret holding the token under secretKey
  secretKey: OTELFLEET_BOOTSTRAP_TOKEN

# Region this agent belongs to — surfaced as a pod label/annotation for
# operators (does not change behaviour; the endpoint above selects the region).
region: ""

# Number of distinct agents to run. Each replica is a separate OpAMP instance
# with its own persistent identity (StatefulSet + per-pod PVC).
replicaCount: 1

logLevel: info

# OTLP receiver ports the managed collector listens on (the control-plane edge
# pipeline uses otlp on these by default); apps in the cluster send here.
service:
  type: ClusterIP
  otlpGrpcPort: 4317
  otlpHttpPort: 4318
  annotations: {}

# Persist the supervisor state (per-agent token, last-good config, instance
# UID) so a restart keeps the agent's identity and survives a control-plane
# outage. Disable only for ephemeral/testing agents.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
