openapi: 3.0.3
info:
  title: otelfleet API
  description: >
    Control-plane REST API for the otelfleet platform. Browser sessions are
    cookie-based (`__Host-otelfleet_session`, HttpOnly). Mutating requests must
    send the `X-CSRF-Token` header obtained from `GET /api/v1/me`.
    OIDC browser flows live outside this spec at `/auth/{provider}/start` and
    `/auth/{provider}/callback`.
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /

tags:
  - name: auth
  - name: customers
  - name: api-keys
  - name: stats

paths:
  /api/v1/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Current session user, role and CSRF token
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/providers:
    get:
      tags: [auth]
      operationId: listAuthProviders
      summary: Configured SSO providers for the login page (public)
      responses:
        "200":
          description: Available login providers
          content:
            application/json:
              schema:
                type: object
                required: [providers, devLoginEnabled]
                properties:
                  providers:
                    type: array
                    items: { $ref: "#/components/schemas/AuthProvider" }
                  devLoginEnabled:
                    type: boolean
                    description: True only when OTELFLEET_DEV_LOGIN=true (local development).

  /api/v1/auth/dev-login:
    post:
      tags: [auth]
      operationId: devLogin
      summary: Password-less local development login (disabled in production)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "204": { description: Session cookie set }
        "403": { description: Dev login disabled, $ref: "#/components/responses/Forbidden" }

  /api/v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Destroy the current session
      responses:
        "204": { description: Session destroyed }

  /api/v1/customers:
    get:
      tags: [customers]
      operationId: listCustomers
      summary: List customers
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [active, suspended] } }
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: object
                required: [customers]
                properties:
                  customers:
                    type: array
                    items: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [customers]
      operationId: createCustomer
      summary: Create a customer (generates client ID and an initial API key)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerCreate" }
      responses:
        "201":
          description: >
            Customer created. `initialApiKey.secret` is returned exactly once
            and never retrievable again.
          content:
            application/json:
              schema:
                type: object
                required: [customer, initialApiKey]
                properties:
                  customer: { $ref: "#/components/schemas/Customer" }
                  initialApiKey: { $ref: "#/components/schemas/ApiKeyCreated" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Slug already exists, $ref: "#/components/responses/Conflict" }

  /api/v1/customers/{customerId}:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [customers]
      operationId: getCustomer
      summary: Get a customer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [customers]
      operationId: updateCustomer
      summary: Update name or status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                status: { type: string, enum: [active, suspended] }
                rateLimitItemsPerSec:
                  type: integer
                  nullable: true
                  description: Set null to remove the quota.
                retentionDays:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 30
                  description: Set null to fall back to the global TTL.
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [customers]
      operationId: deleteCustomer
      summary: Soft-delete a customer (revokes all API keys)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/api-keys:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [api-keys]
      operationId: listApiKeys
      summary: List API keys of a customer (never includes secrets)
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: object
                required: [apiKeys]
                properties:
                  apiKeys:
                    type: array
                    items: { $ref: "#/components/schemas/ApiKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [api-keys]
      operationId: createApiKey
      summary: Create an API key (secret returned exactly once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                expiresAt: { type: string, format: date-time, nullable: true }
      responses:
        "201":
          description: Created key including the one-time secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiKeyCreated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/api-keys/{keyId}:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: keyId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [api-keys]
      operationId: revokeApiKey
      summary: Revoke an API key (takes effect at the gateway within ~60s)
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/stats/overview:
    get:
      tags: [stats]
      operationId: getStatsOverview
      summary: Fleet-wide totals for the dashboard
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsOverview" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/customers/{customerId}/stats/throughput:
    get:
      tags: [stats]
      operationId: getCustomerThroughput
      summary: Per-signal ingest time series for one customer
      parameters:
        - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: signal, in: query, schema: { $ref: "#/components/schemas/Signal" }, description: Omit for all three signals }
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: step, in: query, schema: { type: string, default: 60s, description: "Resolution, e.g. 60s, 5m" } }
      responses:
        "200":
          description: Time series per signal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThroughputResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/catalog/components:
    get:
      tags: [pipelines]
      operationId: getComponentCatalog
      summary: Curated collector components available in the pipeline builder
      responses:
        "200":
          description: Catalog with a JSON Schema per component (drives UI forms)
          content:
            application/json:
              schema:
                type: object
                required: [processors, exporters]
                properties:
                  processors:
                    type: array
                    items: { $ref: "#/components/schemas/CatalogComponent" }
                  exporters:
                    type: array
                    items: { $ref: "#/components/schemas/CatalogComponent" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/pipelines:
    get:
      tags: [pipelines]
      operationId: listPipelines
      summary: List all pipelines across customers
      responses:
        "200":
          description: Pipelines
          content:
            application/json:
              schema:
                type: object
                required: [pipelines]
                properties:
                  pipelines:
                    type: array
                    items: { $ref: "#/components/schemas/Pipeline" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/pipelines/validate:
    post:
      tags: [pipelines]
      operationId: validatePipeline
      summary: Validate a pipeline graph (structural + real `otelcol validate`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [graph]
              properties:
                targetClass:
                  type: string
                  enum: [forwarding, edge]
                  default: forwarding
                graph: { $ref: "#/components/schemas/PipelineGraph" }
      responses:
        "200":
          description: Validation result (also returned for invalid graphs)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/customers/{customerId}/pipelines:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [pipelines]
      operationId: listCustomerPipelines
      summary: List pipelines of a customer
      responses:
        "200":
          description: Pipelines
          content:
            application/json:
              schema:
                type: object
                required: [pipelines]
                properties:
                  pipelines:
                    type: array
                    items: { $ref: "#/components/schemas/Pipeline" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [pipelines]
      operationId: createPipeline
      summary: Create a pipeline with an initial draft version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, graph]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                targetClass:
                  type: string
                  enum: [forwarding, edge]
                  default: forwarding
                graph: { $ref: "#/components/schemas/PipelineGraph" }
      responses:
        "201":
          description: Pipeline created (version 1, not yet active)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pipeline" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Name already exists for this customer, $ref: "#/components/responses/Conflict" }

  /api/v1/pipelines/{pipelineId}:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [pipelines]
      operationId: getPipeline
      summary: Get a pipeline including its versions
      responses:
        "200":
          description: Pipeline detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PipelineDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [pipelines]
      operationId: deletePipeline
      summary: Delete a pipeline (removes it from the forwarding config on next rollout)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/pipelines/{pipelineId}/versions:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [pipelines]
      operationId: createPipelineVersion
      summary: Create a new version from a graph (validated; rejected when invalid)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [graph]
              properties:
                graph: { $ref: "#/components/schemas/PipelineGraph" }
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PipelineVersion" }
        "400":
          description: Graph failed validation (details in errors)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/pipelines/{pipelineId}/versions/{version}:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: version, in: path, required: true, schema: { type: integer } }
    get:
      tags: [pipelines]
      operationId: getPipelineVersion
      summary: Get one version including rendered YAML
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PipelineVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/pipelines/{pipelineId}/versions/{version}/activate:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: version, in: path, required: true, schema: { type: integer } }
    post:
      tags: [pipelines]
      operationId: activatePipelineVersion
      summary: Activate a version (deploys it to the forwarding tier; also used for rollback)
      responses:
        "200":
          description: Activation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RolloutStatus" }
        "400": { description: Version is not valid, $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/pipelines/{pipelineId}/stats/stages:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [stats]
      operationId: getPipelineStageStats
      summary: Per-stage flow metrics for a pipeline (received/exported/failed/queued)
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Stage stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PipelineStageStats" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/agents:
    get:
      tags: [fleet]
      operationId: listAgents
      summary: List collector agents (gateway replicas and edge agents)
      parameters:
        - { name: class, in: query, schema: { type: string, enum: [gateway, edge] } }
        - { name: customerId, in: query, schema: { type: string, format: uuid } }
        - { name: connected, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/agents/{agentId}:
    parameters:
      - { name: agentId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [fleet]
      operationId: getAgent
      summary: Get one agent including its health tree
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [fleet]
      operationId: updateAgent
      summary: Set operator-managed metadata (friendly display name, labels)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentUpdate" }
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [fleet]
      operationId: deleteAgent
      summary: Forget a stale agent (a reconnecting agent re-registers itself)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Agent is currently connected, $ref: "#/components/responses/Conflict" }

  /api/v1/agents/{agentId}/sync:
    parameters:
      - { name: agentId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [fleet]
      operationId: syncAgent
      summary: Force a re-push of the current edge config to this agent's fleet
      description: >-
        Re-renders and re-pushes the customer's current edge config to all of
        that customer's connected edge agents (edge config is per-customer, so
        all of a customer's agents run the same config). Use this to recover an
        agent stuck out of sync, or to re-apply after a failed config. The push
        is asynchronous (handled by the OpAMP tier); offline agents pick it up
        on reconnect. Not applicable to gateway-class agents.
      responses:
        "202":
          description: Re-sync queued
          content:
            application/json:
              schema:
                type: object
                required: [detail]
                properties:
                  detail: { type: string, description: Human-readable rollout scope. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/agents/{agentId}/config:
    parameters:
      - { name: agentId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [fleet]
      operationId: getAgentConfig
      summary: Assigned (desired) and reported (effective) config for the diff view
      responses:
        "200":
          description: Config pair
          content:
            application/json:
              schema:
                type: object
                required: [assignedYaml, reportedYaml]
                properties:
                  assignedYaml:
                    type: string
                    description: What the control plane wants the agent to run ("" for gateway-class agents managed outside OpAMP).
                  reportedYaml:
                    type: string
                    description: Last effective config the agent reported ("" when unknown).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/agents/{agentId}/events:
    parameters:
      - { name: agentId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [fleet]
      operationId: listAgentEvents
      summary: Status transitions of one agent, newest first
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 500 } }
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/AgentEvent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/bootstrap-tokens:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [fleet]
      operationId: listBootstrapTokens
      summary: List edge-agent enrollment tokens (never includes secrets)
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: object
                required: [tokens]
                properties:
                  tokens:
                    type: array
                    items: { $ref: "#/components/schemas/BootstrapToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [fleet]
      operationId: createBootstrapToken
      summary: Create an enrollment token (secret returned exactly once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                expiresAt: { type: string, format: date-time, nullable: true, description: Defaults to 30 days }
                maxUses: { type: integer, default: 0, description: 0 = unlimited }
      responses:
        "201":
          description: Token including the one-time secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BootstrapTokenCreated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/bootstrap-tokens/{tokenId}:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: tokenId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [fleet]
      operationId: revokeBootstrapToken
      summary: Revoke an enrollment token (existing agents stay connected)
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/users:
    get:
      tags: [admin]
      operationId: listUsers
      summary: List UI users (admin only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/UserAccount" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: inviteUser
      summary: Invite a user by email; the role applies on their first SSO login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { $ref: "#/components/schemas/Role" }
                customerIds:
                  type: array
                  items: { type: string, format: uuid }
                  description: >-
                    Tenant-scope grants. When set, a non-admin user is limited
                    to these customers; omit or empty = access to all customers.
                    Ignored for admins.
      responses:
        "201":
          description: Invited user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserAccount" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Email already exists, $ref: "#/components/responses/Conflict" }

  /api/v1/users/{userId}:
    parameters:
      - { name: userId, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [admin]
      operationId: updateUser
      summary: Change role or disable/enable (admin only; self-demotion and disabling the last admin are rejected)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { $ref: "#/components/schemas/Role" }
                disabled: { type: boolean }
                customerIds:
                  type: array
                  items: { type: string, format: uuid }
                  description: >-
                    Replaces the user's full tenant-scope grant set. Empty array
                    clears all grants (access to all customers); omit to leave
                    grants unchanged. Ignored for admins.
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserAccount" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Would remove the last active admin, $ref: "#/components/responses/Conflict" }
    delete:
      tags: [admin]
      operationId: deleteUser
      summary: Delete a user (admin only, not self, not the last admin)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Cannot delete yourself or the last admin, $ref: "#/components/responses/Conflict" }

  /api/v1/settings/auth-providers:
    get:
      tags: [admin]
      operationId: listAuthProviderConfigs
      summary: Configured SSO providers incl. env-defined ones (admin only, no secrets)
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items: { $ref: "#/components/schemas/AuthProviderConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: createAuthProviderConfig
      summary: Add an SSO provider (client secret is encrypted at rest)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthProviderConfigCreate" }
      responses:
        "201":
          description: Created provider
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthProviderConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Provider name already exists, $ref: "#/components/responses/Conflict" }

  /api/v1/settings/auth-providers/{providerId}:
    parameters:
      - { name: providerId, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [admin]
      operationId: updateAuthProviderConfig
      summary: Update a provider; omit clientSecret to keep the stored one
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthProviderConfigUpdate" }
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthProviderConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [admin]
      operationId: deleteAuthProviderConfig
      summary: Remove a provider (existing sessions stay valid)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/settings/auth-providers/{providerId}/test:
    parameters:
      - { name: providerId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [admin]
      operationId: testAuthProviderConfig
      summary: Connectivity test (OIDC discovery / GitHub API reachability)
      responses:
        "200":
          description: Test result (ok=false carries the reason)
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok: { type: boolean }
                  message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/settings/api-tokens:
    get:
      tags: [admin]
      operationId: listApiTokens
      summary: List management-API tokens (admin only, secrets never returned)
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: object
                required: [tokens]
                properties:
                  tokens:
                    type: array
                    items: { $ref: "#/components/schemas/ApiToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: createApiToken
      summary: Create a management-API token (secret returned exactly once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
                role: { $ref: "#/components/schemas/Role" }
                expiresAt: { type: string, format: date-time, nullable: true, description: Defaults to no expiry }
      responses:
        "201":
          description: Token including the one-time secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiTokenCreated" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/settings/api-tokens/{tokenId}:
    parameters:
      - { name: tokenId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [admin]
      operationId: revokeApiToken
      summary: Revoke a management-API token
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/audit:
    get:
      tags: [admin]
      operationId: listAuditLog
      summary: Query the audit log (newest first, cursor-paged)
      parameters:
        - { name: action, in: query, schema: { type: string } }
        - { name: entityType, in: query, schema: { type: string } }
        - { name: customerId, in: query, schema: { type: string, format: uuid } }
        - { name: actorUserId, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: beforeId, in: query, schema: { type: integer, format: int64 }, description: Cursor from the previous page }
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEntry" }
                  nextBeforeId:
                    type: integer
                    format: int64
                    nullable: true
                    description: Pass as beforeId to fetch the next page; null when exhausted.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/stats/cost:
    get:
      tags: [stats]
      operationId: getCostStats
      summary: Ingest volume per customer (items + estimated bytes, daily buckets)
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Cost breakdown
          content:
            application/json:
              schema:
                type: object
                required: [customers]
                properties:
                  customers:
                    type: array
                    items: { $ref: "#/components/schemas/CustomerCost" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/settings/webhooks:
    get:
      tags: [admin]
      operationId: listWebhooks
      summary: List alerting webhooks (admin only, secrets never returned)
      responses:
        "200":
          description: Webhooks
          content:
            application/json:
              schema:
                type: object
                required: [webhooks]
                properties:
                  webhooks:
                    type: array
                    items: { $ref: "#/components/schemas/Webhook" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: createWebhook
      summary: Add an alerting webhook (HMAC-SHA256-signed when a secret is set)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookCreate" }
      responses:
        "201":
          description: Created webhook
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/settings/webhooks/{webhookId}:
    parameters:
      - { name: webhookId, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [admin]
      operationId: updateWebhook
      summary: Update a webhook; omit secret to keep the stored one
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookUpdate" }
      responses:
        "200":
          description: Updated webhook
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [admin]
      operationId: deleteWebhook
      summary: Delete a webhook
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/settings/webhooks/{webhookId}/test:
    parameters:
      - { name: webhookId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [admin]
      operationId: testWebhook
      summary: Send a signed test event to the webhook URL
      responses:
        "200":
          description: Delivery result
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok: { type: boolean }
                  message: { type: string, description: HTTP status or error from the receiver }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/logs:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [explore]
      operationId: queryLogs
      summary: Search a customer's stored logs (newest first)
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: q, in: query, schema: { type: string }, description: Case-insensitive substring match on the log body }
        - { name: service, in: query, schema: { type: string } }
        - { name: minSeverity, in: query, schema: { type: integer }, description: Minimum OTel SeverityNumber (e.g. 9 = INFO, 17 = ERROR) }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 1000 } }
        - { name: before, in: query, schema: { type: string, format: date-time }, description: Cursor — return rows strictly older than this timestamp }
      responses:
        "200":
          description: Matching log records
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items: { $ref: "#/components/schemas/LogRecord" }
                  nextBefore:
                    type: string
                    format: date-time
                    nullable: true
                    description: Pass as `before` for the next page; null when exhausted.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { description: Telemetry store unavailable, $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/traces:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [explore]
      operationId: queryTraces
      summary: List a customer's stored traces (newest first)
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: service, in: query, schema: { type: string } }
        - { name: name, in: query, schema: { type: string }, description: Root span name substring }
        - { name: minDurationMs, in: query, schema: { type: number } }
        - { name: errorsOnly, in: query, schema: { type: boolean } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 1000 } }
        - { name: before, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Matching traces (one row per trace, from its root span)
          content:
            application/json:
              schema:
                type: object
                required: [traces]
                properties:
                  traces:
                    type: array
                    items: { $ref: "#/components/schemas/TraceSummary" }
                  nextBefore: { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/customers/{customerId}/traces/{traceId}:
    parameters:
      - { name: customerId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: traceId, in: path, required: true, schema: { type: string } }
    get:
      tags: [explore]
      operationId: getTrace
      summary: All spans of one trace (for the waterfall view)
      responses:
        "200":
          description: Spans ordered by start time
          content:
            application/json:
              schema:
                type: object
                required: [spans]
                properties:
                  spans:
                    type: array
                    items: { $ref: "#/components/schemas/Span" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: not_found }
        message: { type: string }

    Role:
      type: string
      enum: [admin, operator, viewer]

    Signal:
      type: string
      enum: [logs, traces, metrics]

    Me:
      type: object
      required: [id, email, role, csrfToken, allCustomers]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        csrfToken:
          type: string
          description: Send as X-CSRF-Token header on all mutating requests.
        allCustomers:
          type: boolean
          description: >-
            True when the user may access every customer (admins, and non-admins
            with no grants). When false, access is limited to scopedCustomerIds.
        scopedCustomerIds:
          type: array
          items: { type: string, format: uuid }
          description: Customers this user is limited to (present only when allCustomers is false).

    AuthProvider:
      type: object
      required: [name, displayName, loginUrl]
      properties:
        name: { type: string, example: google }
        displayName: { type: string, example: Google }
        loginUrl: { type: string, example: /auth/google/start }

    Customer:
      type: object
      required: [id, slug, name, clientId, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, example: acme }
        name: { type: string, example: ACME Corp }
        clientId:
          type: string
          example: cust_7f3a9b2c
          description: Stamped as resource attribute `tenant.id` on all ingested data.
        status: { type: string, enum: [active, suspended, deleted] }
        rateLimitItemsPerSec:
          type: integer
          nullable: true
          description: Ingest quota in items/sec across signals; null = unlimited. Enforced at the gateway within the 30s auth cache.
        retentionDays:
          type: integer
          nullable: true
          minimum: 1
          maximum: 30
          description: Telemetry retention override; null = global table TTL (30 days).
        createdAt: { type: string, format: date-time }

    CustomerCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$"
          description: URL-safe identifier; derived from name when omitted.

    ApiKey:
      type: object
      required: [id, customerId, name, keyPrefix, createdAt]
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        name: { type: string }
        keyPrefix:
          type: string
          example: otm_ab12cd34
          description: Non-secret display prefix identifying the key.
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }
        lastUsedAt: { type: string, format: date-time, nullable: true }

    ApiKeyCreated:
      allOf:
        - $ref: "#/components/schemas/ApiKey"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: Full API key. Shown exactly once; only a hash is stored.

    StatsOverview:
      type: object
      required: [activeCustomers, totals, topCustomers]
      properties:
        activeCustomers: { type: integer }
        totals:
          type: object
          required: [logs, traces, metrics]
          description: Ingested item counts in the requested range.
          properties:
            logs: { type: integer, format: int64 }
            traces: { type: integer, format: int64 }
            metrics: { type: integer, format: int64 }
        refusedRequests:
          type: integer
          format: int64
          description: Auth-refused ingest requests in the range (all tenants).
        topCustomers:
          type: array
          items:
            type: object
            required: [customerId, name, items]
            properties:
              customerId: { type: string, format: uuid }
              name: { type: string }
              items: { type: integer, format: int64, description: Total items across signals }

    ThroughputPoint:
      type: object
      required: [ts, value]
      properties:
        ts: { type: string, format: date-time }
        value: { type: number, description: Items per second averaged over the step }

    ThroughputSeries:
      type: object
      required: [signal, points]
      properties:
        signal: { $ref: "#/components/schemas/Signal" }
        points:
          type: array
          items: { $ref: "#/components/schemas/ThroughputPoint" }

    ThroughputResponse:
      type: object
      required: [series]
      properties:
        series:
          type: array
          items: { $ref: "#/components/schemas/ThroughputSeries" }

    CatalogComponent:
      type: object
      required: [type, kind, displayName, description, schema]
      properties:
        type: { type: string, example: batch, description: Collector component type id }
        kind: { type: string, enum: [processor, exporter] }
        displayName: { type: string, example: Batch }
        description: { type: string }
        docsUrl: { type: string, nullable: true }
        schema:
          type: object
          additionalProperties: true
          description: JSON Schema (draft 2020-12) for the component's config; drives the builder form.
        defaults:
          type: object
          additionalProperties: true
          description: Sensible default config used when the component is added.

    PipelineGraph:
      type: object
      required: [signals, processors, exporters]
      description: >
        UI pipeline model. The receiver side is implicit: the customer's ingested
        stream, routed by tenant.id into this pipeline on the forwarding tier.
      properties:
        signals:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Signal" }
        processors:
          type: array
          description: Ordered processor chain.
          items: { $ref: "#/components/schemas/GraphNode" }
        exporters:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/GraphNode" }

    GraphNode:
      type: object
      required: [type, config]
      properties:
        type: { type: string, example: otlphttp }
        name:
          type: string
          nullable: true
          description: Optional instance name to distinguish two nodes of the same type.
        config:
          type: object
          additionalProperties: true

    Pipeline:
      type: object
      required: [id, customerId, name, targetClass, createdAt]
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        customerName: { type: string, nullable: true }
        name: { type: string }
        targetClass:
          type: string
          enum: [forwarding, edge]
          description: >
            forwarding = runs on the central forwarding tier (tenant-routed);
            edge = rendered as standalone config pushed to the customer's
            edge agents via OpAMP.
        activeVersion: { type: integer, nullable: true }
        latestVersion: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }

    PipelineDetail:
      allOf:
        - $ref: "#/components/schemas/Pipeline"
        - type: object
          required: [versions]
          properties:
            versions:
              type: array
              description: Newest first; graph/renderedYaml only via the version endpoint.
              items: { $ref: "#/components/schemas/PipelineVersionSummary" }

    PipelineVersionSummary:
      type: object
      required: [version, validationStatus, createdAt, active]
      properties:
        version: { type: integer }
        validationStatus: { type: string, enum: [valid, invalid] }
        active: { type: boolean }
        createdBy: { type: string, nullable: true, description: Creator email }
        createdAt: { type: string, format: date-time }

    PipelineVersion:
      allOf:
        - $ref: "#/components/schemas/PipelineVersionSummary"
        - type: object
          required: [graph, renderedYaml, configHash]
          properties:
            graph: { $ref: "#/components/schemas/PipelineGraph" }
            renderedYaml:
              type: string
              description: The collector config fragment this version renders to.
            configHash: { type: string, description: SHA-256 hex of renderedYaml }

    ValidationResult:
      type: object
      required: [valid, errors]
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items:
            type: object
            required: [message]
            properties:
              path:
                type: string
                nullable: true
                description: JSON-ish path into the graph (e.g. exporters[0].config.endpoint) when attributable.
              message: { type: string }
        renderedYaml:
          type: string
          nullable: true
          description: Present when rendering succeeded (even if otelcol validate then failed).

    RolloutStatus:
      type: object
      required: [activeVersion, state]
      properties:
        activeVersion: { type: integer }
        state:
          type: string
          enum: [applied, pending_restart]
          description: >
            applied = distributor confirmed rollout (Kubernetes operator);
            pending_restart = config published, forwarding collector restart required (compose dev).
        detail: { type: string, nullable: true }

    ApiToken:
      type: object
      required: [id, name, tokenPrefix, role, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        tokenPrefix: { type: string, example: otm_pat_a1b2c3d4 }
        role: { $ref: "#/components/schemas/Role" }
        createdBy: { type: string, nullable: true, description: Creator email }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }

    ApiTokenCreated:
      allOf:
        - $ref: "#/components/schemas/ApiToken"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: "Full token (otm_pat_…). Shown once; send as an Authorization: Bearer header."

    UserAccount:
      type: object
      required: [id, email, role, disabled, invited, identities, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        disabled: { type: boolean }
        invited:
          type: boolean
          description: True until the user logs in for the first time (no linked identity yet).
        identities:
          type: array
          description: Linked login identities (provider names).
          items: { type: string }
        customerIds:
          type: array
          description: >-
            Tenant-scope grants (empty = access to all customers). Ignored for
            admins, who always access every customer.
          items: { type: string, format: uuid }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    AuthProviderType:
      type: string
      enum: [google, microsoft, github, oidc]

    AuthProviderConfig:
      type: object
      required: [id, type, name, displayName, clientId, enabled, source, redirectUri, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type: { $ref: "#/components/schemas/AuthProviderType" }
        name: { type: string, description: "URL-safe slug used in /auth/{name}/start" }
        displayName: { type: string }
        clientId: { type: string }
        issuer: { type: string, nullable: true, description: Only for type oidc }
        enabled: { type: boolean }
        source:
          type: string
          enum: [database, environment]
          description: environment = defined via OTELFLEET_OIDC_* env vars (read-only here).
        redirectUri:
          type: string
          description: Callback URL to register at the identity provider.
        createdAt: { type: string, format: date-time }

    AuthProviderConfigCreate:
      type: object
      required: [type, name, displayName, clientId, clientSecret]
      properties:
        type: { $ref: "#/components/schemas/AuthProviderType" }
        name:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{1,30}$"
          description: Unique slug; becomes /auth/{name}/start.
        displayName: { type: string, minLength: 1, maxLength: 100 }
        clientId: { type: string, minLength: 1 }
        clientSecret: { type: string, minLength: 1 }
        issuer:
          type: string
          nullable: true
          description: Required for type oidc; ignored for google/microsoft/github.
        enabled: { type: boolean, default: true }

    AuthProviderConfigUpdate:
      type: object
      properties:
        displayName: { type: string, minLength: 1, maxLength: 100 }
        clientId: { type: string, minLength: 1 }
        clientSecret:
          type: string
          description: Omit to keep the stored secret.
        issuer: { type: string, nullable: true }
        enabled: { type: boolean }

    AuditEntry:
      type: object
      required: [id, actorType, action, entityType, entityId, createdAt]
      properties:
        id: { type: integer, format: int64 }
        actorType: { type: string, enum: [user, system, agent] }
        actorUserId: { type: string, format: uuid, nullable: true }
        actorEmail: { type: string, nullable: true }
        action: { type: string, example: pipeline_version.activate }
        entityType: { type: string }
        entityId: { type: string }
        customerId: { type: string, format: uuid, nullable: true }
        customerName: { type: string, nullable: true }
        payload:
          type: object
          additionalProperties: true
          nullable: true
        createdAt: { type: string, format: date-time }

    LogRecord:
      type: object
      required: [timestamp, severityText, severityNumber, serviceName, body]
      properties:
        timestamp: { type: string, format: date-time }
        severityText: { type: string }
        severityNumber: { type: integer }
        serviceName: { type: string }
        body: { type: string }
        traceId: { type: string, nullable: true }
        spanId: { type: string, nullable: true }
        attributes:
          type: object
          additionalProperties: { type: string }
          description: Merged log + resource attributes.

    TraceSummary:
      type: object
      required: [traceId, rootName, rootService, startTime, durationMs, spanCount, errorCount]
      properties:
        traceId: { type: string }
        rootName: { type: string }
        rootService: { type: string }
        startTime: { type: string, format: date-time }
        durationMs: { type: number }
        spanCount: { type: integer }
        errorCount: { type: integer }

    Span:
      type: object
      required: [spanId, name, service, kind, startTime, durationMs, statusCode]
      properties:
        spanId: { type: string }
        parentSpanId: { type: string, nullable: true }
        name: { type: string }
        service: { type: string }
        kind: { type: string }
        startTime: { type: string, format: date-time }
        durationMs: { type: number }
        statusCode: { type: string }
        statusMessage: { type: string, nullable: true }
        attributes:
          type: object
          additionalProperties: { type: string }

    CustomerCost:
      type: object
      required: [customerId, name, items, bytes, days]
      properties:
        customerId: { type: string, format: uuid }
        name: { type: string }
        items: { type: integer, format: int64, description: Total items in the range }
        bytes:
          type: integer
          format: int64
          description: Estimated ingested bytes in the range (in-memory row size, not compressed-at-rest).
        days:
          type: array
          items:
            type: object
            required: [date, items, bytes]
            properties:
              date: { type: string, format: date }
              items: { type: integer, format: int64 }
              bytes: { type: integer, format: int64 }

    WebhookEvent:
      type: string
      enum: [agent_offline, agent_config_failed, agent_unhealthy]

    WebhookType:
      type: string
      enum: [webhook, slack]
      description: >-
        Notification channel type. 'webhook' = generic HMAC-signed JSON POST;
        'slack' = a Slack incoming-webhook message (URL from Slack, no secret).

    Webhook:
      type: object
      required: [id, type, name, url, events, enabled, hasSecret, createdAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/WebhookType" }
        name: { type: string }
        url: { type: string }
        events:
          type: array
          items: { $ref: "#/components/schemas/WebhookEvent" }
        enabled: { type: boolean }
        hasSecret:
          type: boolean
          description: True when deliveries are HMAC-SHA256-signed (X-Otelfleet-Signature). Always false for Slack.
        createdAt: { type: string, format: date-time }

    WebhookCreate:
      type: object
      required: [name, url, events]
      properties:
        type:
          allOf: [{ $ref: "#/components/schemas/WebhookType" }]
          default: webhook
        name: { type: string, minLength: 1, maxLength: 200 }
        url: { type: string, format: uri, description: "Must be https:// (http allowed only for localhost). For Slack, the incoming-webhook URL." }
        events:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEvent" }
        secret: { type: string, nullable: true, description: "HMAC signing secret (generic webhooks only); encrypted at rest" }
        enabled: { type: boolean, default: true }

    WebhookUpdate:
      type: object
      properties:
        type: { $ref: "#/components/schemas/WebhookType" }
        name: { type: string, minLength: 1, maxLength: 200 }
        url: { type: string, format: uri }
        events:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEvent" }
        secret: { type: string, nullable: true, description: "Omit = keep; empty string = remove signing" }
        enabled: { type: boolean }

    AgentClass:
      type: string
      enum: [gateway, edge]

    RemoteConfigStatus:
      type: string
      enum: [unset, applying, applied, failed]

    Agent:
      type: object
      required: [id, instanceUid, class, connected, remoteConfigStatus, createdAt]
      properties:
        id: { type: string, format: uuid }
        instanceUid: { type: string, description: OpAMP instance UID (hex) }
        class: { $ref: "#/components/schemas/AgentClass" }
        customerId: { type: string, format: uuid, nullable: true }
        customerName: { type: string, nullable: true }
        name: { type: string, nullable: true, description: "From AgentDescription (host.name / service.name)" }
        displayName: { type: string, nullable: true, description: Operator-set friendly name; overrides name in the UI. }
        labels:
          type: object
          additionalProperties: { type: string }
          description: Operator-set labels for grouping/filtering (may be empty).
        agentVersion: { type: string, nullable: true }
        connected: { type: boolean }
        healthy: { type: boolean, nullable: true, description: Last reported ComponentHealth; null when never reported }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        remoteConfigStatus: { $ref: "#/components/schemas/RemoteConfigStatus" }
        remoteConfigError: { type: string, nullable: true }
        assignedConfigHash: { type: string, nullable: true, description: SHA-256 hex of the desired config }
        reportedConfigHash: { type: string, nullable: true, description: Hash of the effective config the agent reports (re-serialized; not used for sync state) }
        configInSync:
          type: boolean
          nullable: true
          description: >-
            assigned == the config hash the agent acknowledged via OpAMP;
            null when the agent has not acknowledged a config yet.
        createdAt: { type: string, format: date-time }

    AgentUpdate:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
          maxLength: 120
          description: Friendly name; null or empty clears it (falls back to the reported name).
        labels:
          type: object
          additionalProperties: { type: string }
          description: Replaces the full label set when present; omit to leave labels unchanged.

    AgentDetail:
      allOf:
        - $ref: "#/components/schemas/Agent"
        - type: object
          properties:
            description:
              type: object
              additionalProperties: true
              nullable: true
              description: Full OpAMP AgentDescription attributes.
            health:
              type: object
              additionalProperties: true
              nullable: true
              description: Last ComponentHealth tree as reported.

    AgentEvent:
      type: object
      required: [id, eventType, createdAt]
      properties:
        id: { type: integer, format: int64 }
        eventType:
          type: string
          enum: [connected, disconnected, config_applied, config_failed, healthy, unhealthy, enrolled]
        detail:
          type: object
          additionalProperties: true
          nullable: true
        createdAt: { type: string, format: date-time }

    BootstrapToken:
      type: object
      required: [id, customerId, name, tokenPrefix, maxUses, usedCount, createdAt, expiresAt]
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        name: { type: string }
        tokenPrefix: { type: string, example: otm_bt_a1b2c3d4 }
        maxUses: { type: integer, description: 0 = unlimited }
        usedCount: { type: integer }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }

    BootstrapTokenCreated:
      allOf:
        - $ref: "#/components/schemas/BootstrapToken"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: Full enrollment token. Shown exactly once; only a hash is stored.

    PipelineStageStats:
      type: object
      required: [received, exporters]
      description: >
        Flow view for one pipeline in the requested range. `received` comes from
        the per-tenant count-connector metrics; exporter stages from collector
        self-telemetry (exporter names encode pipeline + node).
      properties:
        received:
          type: array
          description: Items entering the pipeline, per signal.
          items:
            type: object
            required: [signal, items]
            properties:
              signal: { $ref: "#/components/schemas/Signal" }
              items: { type: integer, format: int64 }
        exporters:
          type: array
          items:
            type: object
            required: [name, type, sent, sendFailed, queueSize, queueCapacity]
            properties:
              name: { type: string, description: Exporter instance name, e.g. otlphttp/acme_backup }
              type: { type: string }
              sent: { type: integer, format: int64 }
              sendFailed: { type: integer, format: int64 }
              enqueueFailed: { type: integer, format: int64 }
              queueSize: { type: number, description: Current queue depth (last sample) }
              queueCapacity: { type: number }
